services:
  keeper:
    build:
      context: .
      dockerfile: Dockerfile.keeper
    image: qveris-session-keeper:local
    restart: unless-stopped
    init: true
    user: "10001:10001"
    ports:
      - "${QVK_BIND_ADDRESS:-127.0.0.1}:${QVK_HOST_PORT:-18082}:8081"
    environment:
      QVK_CONFIG_FILE: /run/config/keeper.json
      QVK_ADMIN_TOKEN_FILE: /run/secrets/keeper_admin_token
      QVK_STATE_PATH: /data/keeper.db
      QVK_PROFILE_ROOT: /profiles
      QVK_PROBE_INTERVAL_SECONDS: "${QVK_PROBE_INTERVAL_SECONDS:-900}"
      QVK_SCHEDULER_INTERVAL_SECONDS: "${QVK_SCHEDULER_INTERVAL_SECONDS:-30}"
      QVK_ACTION_TIMEOUT_SECONDS: "${QVK_ACTION_TIMEOUT_SECONDS:-120}"
      QVK_RETRY_BASE_SECONDS: "${QVK_RETRY_BASE_SECONDS:-60}"
      QVK_RETRY_MAX_SECONDS: "${QVK_RETRY_MAX_SECONDS:-3600}"
    volumes:
      - type: bind
        source: "${QVK_CONFIG_FILE:?Set QVK_CONFIG_FILE}"
        target: /run/config/keeper.json
        read_only: true
      - type: bind
        source: "${QVK_SECRET_DIR:?Set QVK_SECRET_DIR}"
        target: /run/secrets
        read_only: true
      - type: bind
        source: "${QVK_ACCOUNT_SECRETS_DIR:?Set QVK_ACCOUNT_SECRETS_DIR}"
        target: /run/account-secrets
        read_only: true
      - type: bind
        source: "${QVK_PROFILES_DIR:?Set QVK_PROFILES_DIR}"
        target: /profiles
      - type: bind
        source: "${QVK_RUNTIME_DIR:?Set QVK_RUNTIME_DIR}"
        target: /data
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,uid=10001,gid=10001
      - /home/keeper:size=16m,mode=0700,uid=10001,gid=10001
    shm_size: "512m"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: "${QVK_MEMORY_LIMIT:-1536m}"
    cpus: "${QVK_CPU_LIMIT:-2.0}"
    pids_limit: "${QVK_PIDS_LIMIT:-512}"
    stop_grace_period: 45s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/live', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
