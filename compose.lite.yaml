services:
  proxy:
    environment:
      QVP_AFFINITY_CAPTURE_BYTES: "${QVP_AFFINITY_CAPTURE_BYTES:-262144}"
      QVP_QUOTA_REFRESH_INTERVAL_SECONDS: "${QVP_QUOTA_REFRESH_INTERVAL_SECONDS:-60}"
      QVP_ACCOUNTS_RELOAD_INTERVAL_SECONDS: "${QVP_ACCOUNTS_RELOAD_INTERVAL_SECONDS:-60}"
      QVP_MAX_CONNECTIONS: "${QVP_MAX_CONNECTIONS:-16}"
      QVP_MAX_INFLIGHT_PER_KEY: "${QVP_MAX_INFLIGHT_PER_KEY:-2}"
      QVP_MAX_REQUEST_BODY_BYTES: "${QVP_MAX_REQUEST_BODY_BYTES:-1048576}"
    mem_limit: "${QVP_MEMORY_LIMIT:-160m}"
    cpus: "${QVP_CPU_LIMIT:-0.5}"
    pids_limit: "${QVP_PIDS_LIMIT:-64}"
    logging:
      options:
        max-size: 5m
        max-file: "2"
